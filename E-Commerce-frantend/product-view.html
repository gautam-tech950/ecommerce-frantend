<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product View</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .product-container {
      display: flex;
      gap: 30px;
    }
    .product-container img {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border: 1px solid #ccc;
    }
    .details {
      max-width: 400px;
    }
    .details h2 {
      margin: 0;
    }
    .price {
      color: green;
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: 0.3s;
    }
    .btn:hover {
      background: darkorange;
    }
    .rating {
      color: gold;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Product Details</h1>
  <div class="product-container">
    <!-- Product Image -->
    <img src="https://example.com/watch.jpg" alt="Smartwatch">

    <!-- Product Details -->
    <div class="details">
      <h2>Smartwatch Model X</h2>
      <p class="price">₹2999</p>
      <p class="rating">⭐⭐⭐⭐☆ (4/5)</p>
      <p>
        This Smartwatch comes with health tracking, notifications, and stylish design.
        Perfect for fitness lovers and tech enthusiasts.
      </p>
      <a href="cart.html" class="btn">Add to Cart</a>
    </div>
  </div>
</body>
</html>
