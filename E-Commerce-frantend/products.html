<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Commerce Home</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

       <!__Navbar__>
        <nav class="navbar">
            <h2>SHAKYA STORE</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html"class=products-link>Products</a></li>
                <li><a href="#">About</a></li>
                 <<li><a href="#">Contact</a></li>
            </ul>
        </nav>
<section>
<div class="container py-5">

  <h2 class="text-center mb-4">Our Products</h2>
</section>

<section>
  <!-- Search -->
  <input type="text" class="form-control mb-3"
         placeholder="Search Products">
</section>

  <!-- Filters -->
  <div class="row mb-4">

    <div class="col-md-6">
      <select class="form-select">
        <option>All Categories</option>
        <option>Electronics</option>
        <option>Fashion</option>
        <option>Shoes</option>
      </select>
    </div>

    <div class="col-md-6">
      <select class="form-select">
        <option>All Prices</option>
        <option>Under ₹1000</option>
        <option>₹1000 - ₹3000</option>
        <option>Above ₹3000</option>
      </select>
    </div>

  </div>

  <!-- Product Cards -->
  <div class="row">

    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://picsum.photos/300/250?random=1"
             class="card-img-top">

        <div class="card-body">
          <h5>Smart Watch</h5>
          <p>$29.99</p>

          <a href="#" class="btn btn-primary">
            View Details
          </a>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://picsum.photos/300/250?random=2"
             class="card-img-top">

        <div class="card-body">
          <h5>Sports Shoes</h5>
          <p>$34.99</p>

          <a href="#" class="btn btn-primary">
            View Details
          </a>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="https://picsum.photos/300/250?random=3"
             class="card-img-top">

        <div class="card-body">
          <h5>T-Shirt</h5>
          <p>$7.99</p>

          <a href="#" class="btn btn-primary">
            View Details
          </a>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
